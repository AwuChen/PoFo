    @font-face {
      font-family: 'Akkurat';
      src: url('../../fonts/AkkuratTrialTT-Regular.ttf') format('ttf');
      font-weight: normal;
      font-style: normal;
    }
    
    @font-face {
      font-family: 'Akkurat';
      src: url('../../fonts/AkkuratTrialTT-Bold.ttf') format('ttf');
      font-weight: bold;
      font-style: normal;
    }
    
    body { margin: 0; overflow: hidden; }
    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px;
      border-radius: 8px;
      font-family: sans-serif;
      max-height: 90vh;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
    }
    #controls h3 {
      margin-top: 10px;
      margin-bottom: 5px;
    }
    .filter-item {
      font-size: 16px;
      margin: 4px 0;
      cursor: pointer;
      color: #777;
      font-weight: bold;
      transition: color 0.2s;
      font-family: 'Akkurat', sans-serif;
    }
    .filter-item.active {
      color: #000;
    }
    #entityList {
      position: absolute;
      font-family: sans-serif;
      z-index: 11;
      max-height: 90vh;
      overflow-y: auto;
      display: none; /* hidden by default */
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      padding: 8px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #entityList div {
      cursor: pointer;
      margin: 4px 0;
      color: #444;
      font-weight: 500;
      font-size: 15px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    #entityList div:hover {
      color: #000;
      background-color: #eee;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/force-graph"></script>
</head>

  // For backward compatibility, convert old impacts array to new format if needed
  entities.forEach(entity => {
    if (entity.impacts.length && typeof entity.impacts[0] === 'string') {
      entity.impacts = entity.impacts.map(impact => ({ name: impact, size: 'M' }));
    }
  });

  const impactRingMap = {
    'Strategy. Culture': 0,
    'Creative Solution': 1,
    'Branding': 2,
    'Retail. Curation': 3,
    'East. West': 4,
    'Edu. Learning': 5
  };

  // S, M, L size mapping
  const impactSizeMap = {
    S: 4,
    M: 8,
    L: 14
  };

  const ringSpacing = 80;
  const baseRadius = 100;
  const ringColors = ['#bc6c25', '#606c38', '#283618', '#dda15e', '#7b7b7b', '#8ecae6'];
  const maxLayers = 6;

  // --- OPTIMIZATION: Centralized state for filters ---
  const activeFilters = {
    category: null,
    impacts: new Set()
  };

  // --- PREPARE GRAPH DATA (Done only once) ---
  const nodes = [];
  const links = [];
  let nodeIdCounter = 0;

  const centerNode = { id: nodeIdCounter++, fx: 0, fy: 0, size: 4, color: '#000000', visible: true };
  nodes.push(centerNode);

  entities.forEach((entity, index) => {
    entity.radialIndex = index; // Assign a unique index to each entity's spoke
    const angle = (2 * Math.PI * index) / entities.length;
    let lastNodeId = centerNode.id;

    entity.impacts.forEach((impactObj, i, arr) => {
      const impact = impactObj.name;
      const sizeLabel = impactObj.size || 'M';
      const nodeSize = impactSizeMap[sizeLabel] || 8;
      const ringIndex = impactRingMap[impact] ?? 0;
      const radius = baseRadius + ringIndex * ringSpacing;
      const x = radius * Math.cos(angle);
      const y = radius * Math.sin(angle);

      const node = {
        id: nodeIdCounter++,
        fx: x, fy: y,
        name: entity.name, categories: entity.categories, impact: impact,
        radialIndex: index,
        size: nodeSize,
        color: ringColors[ringIndex % ringColors.length],
        visible: true // Add visibility flag
      };
      nodes.push(node);
      links.push({ source: lastNodeId, target: node.id, radialIndex: index, visible: true });
      lastNodeId = node.id;

      if (i === arr.length - 1) { // Tip node for label
        const tipNode = {
          id: nodeIdCounter++,
          fx: x * 1.15, fy: y * 1.15,
          name: entity.name, categories: entity.categories, impact: impact,
          radialIndex: index,
          size: 0.1, color: 'rgba(0,0,0,0)', visible: true
        };
        nodes.push(tipNode);
        links.push({ source: lastNodeId, target: tipNode.id, radialIndex: index, visible: true });
      }
    });
  });

  const gData = { nodes, links };

  // --- INITIALIZE GRAPH ---
  const Graph = ForceGraph()(document.getElementById('graph'))
    .graphData(gData)
    .enableNodeDrag(false)
    .linkWidth(0.5)
    .linkColor(() => '#000000')
    // --- OPTIMIZATION: Use visibility methods ---
    .nodeVisibility(node => node.visible)
    .linkVisibility(link => link.visible)
    .nodeCanvasObject(drawNode) // Use a dedicated drawing function for clarity
    .onNodeClick(handleNodeClick);

  // --- UI & FILTERING LOGIC ---
  const categoryFiltersEl = document.getElementById('categoryFilters');
  const impactFiltersEl = document.getElementById('impactFilters');
  const entityListEl = document.getElementById('entityList');
  const infoPopupEl = document.getElementById('infoPopup');

  function setupFilters() {
    const allCategories = [...new Set(entities.flatMap(e => e.categories))];
    const allImpacts = [...new Set(entities.flatMap(e => e.impacts.map(i => i.name)))];

    allCategories.forEach(category => {
      const item = document.createElement('div');
      item.className = 'filter-item';
      item.textContent = category;
      item.dataset.value = category;
      item.onclick = (e) => handleCategoryClick(e.target, category);
      categoryFiltersEl.appendChild(item);
    });

    allImpacts.forEach(impact => {
      const item = document.createElement('div');
      item.className = 'filter-item';
      item.textContent = impact;
      item.dataset.value = impact;
      item.onclick = (e) => handleImpactClick(e.target, impact);
      impactFiltersEl.appendChild(item);
    });
  }

  function handleCategoryClick(element, category) {
    const isDeselecting = activeFilters.category === category;
    
    // Deactivate all other category buttons
    document.querySelectorAll('#categoryFilters .filter-item').forEach(el => el.classList.remove('active'));
    
    if (isDeselecting) {
      activeFilters.category = null;
      hideEntityList();
    } else {
      activeFilters.category = category;
      element.classList.add('active');
      showEntityList(category, element);
    }
    updateGraphVisibility();
  }

  function handleImpactClick(element, impact) {
    element.classList.toggle('active');
    if (activeFilters.impacts.has(impact)) {
      activeFilters.impacts.delete(impact);
    } else {
      activeFilters.impacts.add(impact);
    }
    updateGraphVisibility();
  }
  
  function updateGraphVisibility() {
    const { category, impacts } = activeFilters;
    
    const radialToInclude = new Set();
    
    // If no filters, show all
    if (!category && impacts.size === 0) {
      gData.nodes.forEach(n => n.visible = true);
      gData.links.forEach(l => l.visible = true);
    } else {
      // Determine which entity spokes to show
      entities.forEach(entity => {
        const catMatch = !category || entity.categories.includes(category);
        const impactMatch = impacts.size === 0 || entity.impacts.some(imp => impacts.has(imp.name));
        if (catMatch && impactMatch) {
          radialToInclude.add(entity.radialIndex);
        }
      });
      
      gData.nodes.forEach(n => {
        n.visible = n.id === centerNode.id || radialToInclude.has(n.radialIndex);
      });
      gData.links.forEach(l => {
        l.visible = radialToInclude.has(l.radialIndex);
      });
    }

    // Trigger a graph refresh to apply visibility changes
    Graph.nodeVisibility(Graph.nodeVisibility()).linkVisibility(Graph.linkVisibility());
  }

  function filterToEntity(entity) {
    gData.nodes.forEach(n => {
        n.visible = n.id === centerNode.id || n.radialIndex === entity.radialIndex;
    });
    gData.links.forEach(l => {
        l.visible = l.radialIndex === entity.radialIndex;
    });
    Graph.nodeVisibility(Graph.nodeVisibility()).linkVisibility(Graph.linkVisibility());
    hideEntityList();
    showInfoPopup(entity);
  }
  
  // --- UI HELPER FUNCTIONS ---
  function showEntityList(category, clickedElement) {
    const matchingEntities = entities.filter(e => e.categories.includes(category));
    entityListEl.innerHTML = '';
    
    matchingEntities.forEach(entity => {
      const el = document.createElement('div');
      el.textContent = entity.name;
      el.onclick = () => filterToEntity(entity);
      entityListEl.appendChild(el);
    });

    const rect = clickedElement.getBoundingClientRect();
    entityListEl.style.left = `${rect.right + 10}px`;
    entityListEl.style.top = `${rect.top + window.scrollY}px`;
    entityListEl.style.display = 'block';
  }

  function hideEntityList() {
    entityListEl.style.display = 'none';
  }

  function handleNodeClick(node) {
    if (!node.name) return;
    const entity = entities.find(e => e.name === node.name);
    if (entity) {
      showInfoPopup(entity);
    }
  }

  function showInfoPopup(entity) {
    infoPopupEl.style.display = 'block';
    document.getElementById('popupName').textContent = entity.name;
    document.getElementById('popupCategory').textContent = `Category: ${entity.categories.join(', ')}`;
    // Use the full impact list for the popup
    document.getElementById('popupImpacts').textContent = `Impacts: ${entity.impacts.map(i => i.name).join(', ')}`;
  }
  
  // Close info popup when clicking outside of it or a node
  document.addEventListener('click', (event) => {
    if (infoPopupEl.style.display === 'block' && !infoPopupEl.contains(event.target) && !event.target.closest('canvas')) {
      infoPopupEl.style.display = 'none';
    }
  }, true);

  // --- CUSTOM DRAWING ---
  function drawNode(node, ctx) {
    if (node.id === centerNode.id) {
      // Draw concentric rings
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      for (let i = 0; i < maxLayers; i++) {
        ctx.beginPath();
        ctx.arc(node.x, node.y, baseRadius + i * ringSpacing, 0, 2 * Math.PI);
        ctx.stroke();
      }
    } else {
      // Draw normal node
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.size, 0, 2 * Math.PI, false);
      ctx.fillStyle = node.color || '#666';
      ctx.fill();

      // Draw label on tip nodes
      if (node.size <= 0.1 && node.name) {
        const { fx, fy } = node;
        const angle = Math.atan2(fy, fx);
        const text = node.name;
        
        ctx.save();
        ctx.translate(fx, fy);
        const isFlipped = (angle > Math.PI / 2 || angle < -Math.PI / 2);
        ctx.rotate(isFlipped ? angle + Math.PI : angle);
        ctx.textAlign = isFlipped ? 'right' : 'left';
        ctx.font = '10px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#000';
        ctx.fillText(text, isFlipped ? -10 : 10, 0);
        ctx.restore();
      }
    }
  }
  
  // --- INITIALIZE ---
  setupFilters();
